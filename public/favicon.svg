<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Quietfolio compact app icon</title>
  <desc id="desc">A compact violet Q with a page-shaped tail on a dark rounded-square background, optimized for small sizes.</desc>
  <defs>
